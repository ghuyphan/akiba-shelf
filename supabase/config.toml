project_id = "akiba-shelf"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.seed]
enabled = false

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = ["http://127.0.0.1:5173/auth/callback", "http://127.0.0.1:5173/auth/set-password"]
enable_signup = true
minimum_password_length = 10
password_requirements = "lower_upper_letters_digits"

# Enable this provider for local Supabase after supplying the Google client ID
# and secret. See README.md for the required Google and Supabase callbacks.
[auth.external.google]
enabled = false
client_id = ""
secret = ""
skip_nonce_check = false

[storage]
enabled = true
file_size_limit = "10MiB"

[functions.notify-new-order]
verify_jwt = true

[functions.invite-shop-member]
verify_jwt = true
