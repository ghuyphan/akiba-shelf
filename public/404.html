<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Page not found · Matsuri</title>
    <script>
      (() => {
        const path = window.location.pathname;
        const redirect = `${path || "/"}${window.location.search}${window.location.hash}`;
        const unsafeTarget = /^(?:[a-z][a-z\d+.-]*:|\/\/)/i;
        if (!unsafeTarget.test(redirect) && redirect.startsWith("/")) {
          window.location.replace(`/?redirect=${encodeURIComponent(redirect)}`);
        } else {
          window.location.replace("/");
        }
      })();
    </script>
  </head>
  <body></body>
</html>
