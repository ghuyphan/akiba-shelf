name: Validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  actions: read
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=moderate
      - run: npm run check
      - run: npm run test:coverage
      - run: git diff --check

  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: npm ci
      - run: supabase start
      - run: supabase test db
      - run: npm run test:functions
      - name: Concurrency integration tests
        shell: bash
        run: |
          supabase status -o env > supabase.env
          source supabase.env
          SUPABASE_URL="$API_URL" SUPABASE_ANON_KEY="$ANON_KEY" SUPABASE_SERVICE_ROLE_KEY="$SERVICE_ROLE_KEY" npm run test:db:integration

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: npm run test:perf
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [checks, database, e2e]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_VAPID_PUBLIC_KEY: BJ5O1JOxe_4wVS8DmJKMtZxMH9-ENJBgks-JiC7S2iaZWSUNl2TfV0C6BjU8qCFHmeenuI22fSXkOYJjXoIkDAY
    steps:
      - uses: actions/checkout@v4
      - name: Resolve previous successful deployment
        id: previous-deployment
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "validate.yml",
              branch: "main",
              status: "success",
              per_page: 1,
            });
            core.setOutput(
              "sha",
              data.workflow_runs[0]?.head_sha ?? context.payload.before,
            );
      - name: Check out previous deployment
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.previous-deployment.outputs.sha }}
          path: previous-deployment
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Build previous deployment
        run: npm ci && npm run build
        working-directory: previous-deployment
      - name: Retain previous immutable assets
        run: rsync -a --ignore-existing previous-deployment/dist/ dist/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
