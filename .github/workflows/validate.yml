name: CI and Deploy

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: matsuri-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  actions: read
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=moderate
      - run: npm run check
      - run: npm run test:coverage
      - run: git diff --check

  database:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - uses: supabase/setup-cli@v3
        with:
          version: 2.109.1
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: npm ci
      - run: supabase start
      - run: supabase test db
      - run: npm run test:functions
      - name: Concurrency integration tests
        shell: bash
        run: |
          supabase status -o env > supabase.env
          source supabase.env
          SUPABASE_URL="$API_URL" SUPABASE_ANON_KEY="$ANON_KEY" SUPABASE_SERVICE_ROLE_KEY="$SERVICE_ROLE_KEY" npm run test:db:integration

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: npm run test:perf
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

  deploy-cloudflare:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: [checks, database, e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: matsuri-cloudflare-production
      cancel-in-progress: false
    permissions:
      actions: read
      contents: read
      deployments: write
    environment:
      name: cloudflare-pages
      url: ${{ steps.deployment.outputs.deployment-url }}
    env:
      MATSURI_RELEASE: ${{ github.sha }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_TURNSTILE_SITE_KEY: ${{ vars.VITE_TURNSTILE_SITE_KEY }}
      VITE_VAPID_PUBLIC_KEY: BJ5O1JOxe_4wVS8DmJKMtZxMH9-ENJBgks-JiC7S2iaZWSUNl2TfV0C6BjU8qCFHmeenuI22fSXkOYJjXoIkDAY
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
      VITE_APP_ENV: production
      VITE_RUM_SAMPLE_RATE: ${{ vars.VITE_RUM_SAMPLE_RATE || '0.1' }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Validate deployment configuration
        shell: bash
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          missing=0
          for name in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY VITE_TURNSTILE_SITE_KEY; do
            if [[ -z "${!name}" ]]; then
              echo "::error::$name is not configured for the cloudflare-pages environment"
              missing=1
            fi
          done
          exit "$missing"
      - name: Resolve active Cloudflare deployment
        id: active-deployment
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        shell: bash
        run: |
          response="$(curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/matsuri/deployments?env=production&per_page=1")"
          RESPONSE="$response" node -e '
            const result = JSON.parse(process.env.RESPONSE).result?.[0];
            const output = process.env.GITHUB_OUTPUT;
            require("node:fs").appendFileSync(output, `id=${result?.id ?? ""}\nsha=${result?.deployment_trigger?.metadata?.commit_hash ?? ""}\n`);
          '
      - name: Resolve active deployment artifact
        id: previous-deployment
        uses: actions/github-script@v9
        with:
          script: |
            const activeSha = "${{ steps.active-deployment.outputs.sha }}";
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "validate.yml",
              branch: "main",
              status: "success",
              per_page: 100,
            });
            const previousRun = activeSha
              ? data.workflow_runs.find((run) => run.head_sha === activeSha)
              : undefined;
            let artifact;
            if (previousRun) {
              const { data: artifactData } = await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: previousRun.id,
                per_page: 100,
              });
              artifact = artifactData.artifacts.find(
                (candidate) =>
                  candidate.name === `cloudflare-pages-build-${activeSha}` &&
                  !candidate.expired,
              );
            }
            core.setOutput("run_id", previousRun?.id ?? "");
            core.setOutput("artifact_id", artifact?.id ?? "");
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Preserve clean deployment build
        uses: actions/upload-artifact@v7
        with:
          name: cloudflare-pages-build-${{ github.sha }}
          path: dist/
          retention-days: 90
          if-no-files-found: error
      - name: Download previous clean deployment build
        if: steps.previous-deployment.outputs.artifact_id != ''
        uses: actions/download-artifact@v8
        with:
          artifact-ids: ${{ steps.previous-deployment.outputs.artifact_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.previous-deployment.outputs.run_id }}
          path: previous-deployment/dist
      - name: Retain previous immutable assets
        if: steps.previous-deployment.outputs.artifact_id != ''
        run: node scripts/retain-previous-assets.mjs previous-deployment/dist dist
      - name: Deploy to Cloudflare Pages
        id: deployment
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=matsuri --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          packageManager: npm
          wranglerVersion: 4.113.0
      - name: Verify deployed Cloudflare release
        id: verify-deployment
        continue-on-error: true
        env:
          DEPLOYMENT_URL: ${{ steps.deployment.outputs.deployment-url }}
        run: >-
          node scripts/verify-cloudflare-deployment.mjs
          "$DEPLOYMENT_URL"
          https://matsuri.pro
          https://www.matsuri.pro
      - name: Smoke production routes and checkout preflight
        id: smoke-production
        if: steps.verify-deployment.outcome == 'success'
        continue-on-error: true
        run: >-
          npm run smoke:production --
          --base-url https://matsuri.pro
          --supabase-url "$VITE_SUPABASE_URL"
          --supabase-anon-key "$VITE_SUPABASE_ANON_KEY"
          --storefront-slug "${{ vars.MATSURI_SMOKE_SHOP_SLUG || 'demo-booth' }}"
      - name: Roll back failed production release
        if: always() && (steps.verify-deployment.outcome == 'failure' || steps.smoke-production.outcome == 'failure') && steps.active-deployment.outputs.id != ''
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PREVIOUS_DEPLOYMENT_ID: ${{ steps.active-deployment.outputs.id }}
        run: >-
          curl --fail-with-body --silent --show-error --request POST
          --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN"
          "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/matsuri/deployments/$PREVIOUS_DEPLOYMENT_ID/rollback"
      - name: Fail release after smoke rollback
        if: always() && (steps.verify-deployment.outcome == 'failure' || steps.smoke-production.outcome == 'failure')
        run: exit 1
